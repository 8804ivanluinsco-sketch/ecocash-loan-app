<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">

    <style>
        .dashboard-card {
            background: #1e63c6;
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .amount {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
        }

        .pay {
            background: #28a745;
            color: white;
        }

        .extend {
            background: #ffc107;
        }

        .details {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }

        .details p {
            margin: 8px 0;
            font-size: 14px;
        }

        .top-text {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="header"></div>

<div class="container">

    <div class="top-text" id="userName">Welcome</div>

    <!-- MAIN LOAN CARD -->
    <div class="dashboard-card">
        <div>Current Loan</div>
        <div class="amount" id="loanAmount">$0</div>

        <div class="status" id="loanStatus">Status: Pending ⏳</div>
        <div class="status" id="dueDate">Due: --</div>

        <div class="actions">
            <button class="action-btn pay">Pay Now</button>
            <button class="action-btn extend">Extend</button>
        </div>
    </div>

    <!-- LOAN DETAILS -->
    <div class="details">
        <h3>Loan Details</h3>
        <p><strong>Amount:</strong> <span id="detailAmount">$0</span></p>
        <p><strong>Interest:</strong> 10%</p>
        <p><strong>Total Repayment:</strong> <span id="totalPay">$0</span></p>
        <p><strong>Duration:</strong> <span id="duration">-- days</span></p>
    </div>

    <!-- WARNING -->
    <div class="details" style="background:#fff3cd;">
        ⚠️ Late repayment increases interest to <strong>15%</strong>
    </div>

    <button onclick="logout()">Logout</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    document.body.classList.add("loaded");

    // USER NAME
    const name = localStorage.getItem("fullName");
    if (name) {
        document.getElementById("userName").textContent = "Welcome, " + name;
    }

    // LOAN DATA (fallback values if not set)
    let amount = localStorage.getItem("loanAmount") || "150";
    let duration = localStorage.getItem("loanDuration") || "14";
    let status = localStorage.getItem("loanStatus") || "PENDING";

    let total = Math.round(amount * 1.10);

    document.getElementById("loanAmount").textContent = "$" + amount;
    document.getElementById("detailAmount").textContent = "$" + amount;
    document.getElementById("totalPay").textContent = "$" + total;
    document.getElementById("duration").textContent = duration + " days";

    // STATUS
    const statusBox = document.getElementById("loanStatus");

    if (status === "APPROVED") {
        statusBox.textContent = "Status: Approved ✔";
    } else if (status === "REJECTED") {
        statusBox.textContent = "Status: Rejected ✖";
    } else {
        statusBox.textContent = "Status: Pending ⏳";
    }

    // DUE DATE (simple calc)
    const today = new Date();
    today.setDate(today.getDate() + parseInt(duration));
    document.getElementById("dueDate").textContent =
        "Due: " + today.toDateString();

});

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
