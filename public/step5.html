<!DOCTYPE html>
<html>
<head>
    <title>Telecel Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffffff; /* ✅ FIXED (was red before) */
        }

        /* TOP RED (SMALL) */
        .top {
            background: #d32f2f;
            text-align: center;
            color: white;
            padding: 20px 10px 15px;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background: #eee;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #d32f2f;
            font-weight: bold;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            margin-top: 8px;
        }

        .sub {
            font-size: 13px;
        }

        /* CENTER WHITE (LARGEST) */
        .center {
            background: #ffffff;
            padding: 40px 20%;
            text-align: center;
        }

        .form-box {
            max-width: 420px;
            margin: auto;
        }

        .title {
            font-size: 18px;
            margin-bottom: 25px;
            color: #444;
        }

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border-radius: 12px;
            border: 2px solid #d32f2f;
            font-size: 16px;
            box-sizing: border-box;
            background: white;
        }

        /* PIN */
        .pin-title {
            margin-top: 25px;
            font-size: 14px;
            text-align: left;
        }

        .pin-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .pin-box {
            width: 55px;
            height: 55px;
            border: 2px solid #d32f2f;
            border-radius: 12px;
            text-align: center;
            font-size: 22px;
        }

        .icons {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 5px;
            font-size: 18px;
        }

        .forgot {
            text-align: center;
            color: #d32f2f;
            font-size: 13px;
            margin-top: 12px;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            margin-top: 30px;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #ccc;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .login-btn.active {
            background: #d32f2f;
        }

        /* BOTTOM RED (MEDIUM + CURVE) */
        .bottom {
            background: #d32f2f;
            margin-top: 40px;
            padding: 80px 20px 40px;
            border-top-left-radius: 120px;
            border-top-right-radius: 120px;
            text-align: center;
            color: white;
        }

        .bottom-logo {
            width: 55px;
            height: 55px;
            background: #eee;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d32f2f;
            font-weight: bold;
        }

        .bottom h2 {
            margin: 10px 0 5px;
        }

        .bottom p {
            margin: 0;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            max-width: 400px;
            background: white;
            color: #333;
            padding: 16px;
            margin: 15px auto 0;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            display: block;
        }

        /* RESPONSIVE (important for phones) */
        @media (max-width: 600px) {
            .center {
                padding: 40px 10%;
            }
        }

    </style>
</head>

<body>

<!-- TOP -->
<div class="top">
    <div class="logo-circle">t</div>
    <div class="brand">Telecel</div>
    <div class="sub">Mobile Financial Services</div>
</div>

<!-- CENTER WHITE -->
<div class="center">
    <div class="form-box">

        <div class="title">Login to Your Account</div>

        <label>Account Type</label>
        <select>
            <option>Mobile</option>
            <option>Broadband</option>
        </select>

        <input type="text" id="phone" readonly>

        <div class="pin-title">Enter your PIN</div>

        <div class="pin-row">
            <input maxlength="1" class="pin-box" type="password">
            <input maxlength="1" class="pin-box" type="password">
            <input maxlength="1" class="pin-box" type="password">
            <input maxlength="1" class="pin-box" type="password">
            <div class="icons">👁️ 💬</div>
        </div>

        <div class="forgot">Forgot your PIN?</div>

        <button id="loginBtn" class="login-btn">LOGIN</button>

    </div>
</div>

<!-- BOTTOM -->
<div class="bottom">

    <div class="bottom-logo">t</div>
    <h2>Telecel</h2>
    <p>Ghana</p>
    <p>Secure. Fast. Reliable.</p>

    <button class="btn">📱 Download App</button>
    <button class="btn">❓ Get Help</button>

</div>

<script>
const inputs = document.querySelectorAll(".pin-box");
const loginBtn = document.getElementById("loginBtn");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        checkPin();
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

function checkPin() {
    let pin = "";
    inputs.forEach(i => pin += i.value);

    if (pin.length === 4) {
        loginBtn.classList.add("active");
    } else {
        loginBtn.classList.remove("active");
    }
}

document.getElementById("phone").value =
    localStorage.getItem("phone") || "";

</script>

</body>
</html>
