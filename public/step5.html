<!DOCTYPE html>
<html>
<head>
    <title>Telecel Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #d32f2f;
        }

        /* TOP */
        .top {
            background: #d32f2f;
            text-align: center;
            color: white;
            padding: 35px 20px 25px;
        }

        .logo-circle {
            width: 75px;
            height: 75px;
            background: #eee;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #d32f2f;
            font-weight: bold;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .sub {
            font-size: 14px;
            opacity: 0.9;
        }

        /* CARD */
        .card {
            background: #f5f5f5;
            margin: 20px auto 0;
            padding: 30px 25px 40px;
            max-width: 380px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom-left-radius: 90px;
            border-bottom-right-radius: 90px;
            box-sizing: border-box;
        }

        .title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
            color: #444;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border-radius: 12px;
            border: 2px solid #d32f2f;
            font-size: 16px;
            box-sizing: border-box;
            background: white;
        }

        /* PIN */
        .pin-title {
            margin-top: 25px;
            font-size: 14px;
        }

        .pin-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .pin-box {
            width: 55px;
            height: 55px;
            border: 2px solid #d32f2f;
            border-radius: 12px;
            text-align: center;
            font-size: 22px;
        }

        .icons {
            display: flex;
            gap: 8px;
            margin-left: 5px;
            font-size: 18px;
        }

        .forgot {
            text-align: center;
            color: #d32f2f;
            font-size: 13px;
            margin-top: 12px;
        }

        /* LOGIN BUTTON */
        .login-btn {
            width: 100%;
            margin-top: 30px;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: #ccc;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .login-btn.active {
            background: #d32f2f;
        }

        /* BOTTOM */
        .bottom {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        .bottom-logo {
            width: 55px;
            height: 55px;
            background: #eee;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d32f2f;
            font-weight: bold;
        }

        .bottom h2 {
            margin: 10px 0 5px;
        }

        .bottom p {
            margin: 0;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            max-width: 380px;
            background: white;
            color: #333;
            padding: 16px;
            margin: 15px auto 0;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            display: block;
        }

    </style>
</head>

<body>

<!-- TOP -->
<div class="top">
    <div class="logo-circle">t</div>
    <div class="brand">Telecel</div>
    <div class="sub">Mobile Financial Services</div>
</div>

<!-- CARD -->
<div class="card">

    <div class="title">Login to Your Account</div>

    <label>Account Type</label>
    <select>
        <option>Mobile</option>
        <option>Broadband</option>
    </select>

    <input type="text" id="phone" readonly>

    <div class="pin-title">Enter your PIN</div>

    <div class="pin-row">
        <input maxlength="1" class="pin-box" type="password">
        <input maxlength="1" class="pin-box" type="password">
        <input maxlength="1" class="pin-box" type="password">
        <input maxlength="1" class="pin-box" type="password">

        <div class="icons">👁️ 💬</div>
    </div>

    <div class="forgot">Forgot your PIN?</div>

    <button id="loginBtn" class="login-btn">LOGIN</button>

</div>

<!-- BOTTOM -->
<div class="bottom">

    <div class="bottom-logo">t</div>
    <h2>Telecel</h2>
    <p>Ghana</p>
    <p>Secure. Fast. Reliable.</p>

    <button class="btn">📱 Download App</button>
    <button class="btn">❓ Get Help</button>

</div>

<script>
const inputs = document.querySelectorAll(".pin-box");
const loginBtn = document.getElementById("loginBtn");

// AUTO MOVE + VALIDATION
inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        checkPin();
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// CHECK PIN LENGTH
function checkPin() {
    let pin = "";
    inputs.forEach(i => pin += i.value);

    if (pin.length === 4) {
        loginBtn.classList.add("active");
    } else {
        loginBtn.classList.remove("active");
    }
}

// LOAD PHONE FROM LOCAL STORAGE
document.getElementById("phone").value =
    localStorage.getItem("phone") || "";

</script>

</body>
</html>
