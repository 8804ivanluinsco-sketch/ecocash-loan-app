<!DOCTYPE html>
<html>
<head>
    <title>Telecel Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #d32f2f;
        }

        /* TOP RED */
        .top {
            background: #d32f2f;
            text-align: center;
            color: white;
            padding: 30px 20px 20px;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: #eee;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #d32f2f;
            font-weight: bold;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .sub {
            font-size: 14px;
            opacity: 0.9;
        }

        /* WHITE CARD */
        .card {
            background: #f5f5f5;
            margin-top: 20px;
            padding: 25px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom-left-radius: 60px;
            border-bottom-right-radius: 60px;
        }

        .title {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            color: #444;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border-radius: 10px;
            border: 2px solid #d32f2f;
            font-size: 16px;
            box-sizing: border-box;
            background: white;
        }

        /* PIN */
        .pin-title {
            margin-top: 20px;
            font-size: 14px;
        }

        .pin-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .pin-box {
            width: 50px;
            height: 50px;
            border: 2px solid #d32f2f;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
        }

        .icons {
            display: flex;
            gap: 8px;
            margin-left: 5px;
            font-size: 18px;
        }

        .forgot {
            text-align: center;
            color: #d32f2f;
            font-size: 13px;
            margin-top: 10px;
        }

        .login-btn {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background: #ddd;
            color: white;
            font-size: 16px;
        }

        /* BOTTOM */
        .bottom {
            text-align: center;
            color: white;
            padding: 30px 20px;
        }

        .bottom-logo {
            width: 50px;
            height: 50px;
            background: #eee;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d32f2f;
            font-weight: bold;
        }

        .bottom h2 {
            margin: 10px 0 5px;
        }

        .bottom p {
            margin: 0;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            background: white;
            color: #333;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
        }

    </style>
</head>

<body>

<!-- TOP -->
<div class="top">
    <div class="logo-circle">t</div>
    <div class="brand">Telecel</div>
    <div class="sub">Mobile Financial Services</div>
</div>

<!-- CARD -->
<div class="card">

    <div class="title">Login to Your Account</div>

    <label>Account Type</label>
    <select>
        <option>Mobile</option>
    </select>

    <input type="text" value="0507950028">

    <div class="pin-title">Enter your PIN</div>

    <div class="pin-row">
        <input maxlength="1" class="pin-box" type="password">
        <input maxlength="1" class="pin-box" type="password">
        <input maxlength="1" class="pin-box" type="password">
        <input maxlength="1" class="pin-box" type="password">

        <div class="icons">
            👁️ 💬
        </div>
    </div>

    <div class="forgot">Forgot your PIN?</div>

    <button class="login-btn">LOGIN</button>

</div>

<!-- BOTTOM -->
<div class="bottom">

    <div class="bottom-logo">t</div>
    <h2>Telecel</h2>
    <p>Ghana</p>
    <p>Secure. Fast. Reliable.</p>

    <button class="btn">📱 Download App</button>
    <button class="btn">❓ Get Help</button>

</div>

<script>
const inputs = document.querySelectorAll(".pin-box");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});
</script>

</body>
</html>
