<!DOCTYPE html>
<html lang="en">
<head>
    <title>Step 1</title>

    <!-- ✅ MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Embedded styling for the calculator layout */
        .calculator-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }
        .calc-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .calc-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px dashed #dee2e6;
            font-weight: bold;
            font-size: 16px;
        }
        .calc-val {
            color: #2c3e50;
        }
        .total-val {
            color: #ff9900; /* EcoCash Orange accent */
        }
    </style>
</head>

<body>

<!-- 🔵 TOP -->
<div class="header"></div>

<!-- ⚪ CENTER CARD -->
<div class="container">

    <h2 class="title">Loan Details</h2>

    <label>Amount ($100 - $1000)</label>
    <input type="range" min="100" max="1000" step="10" value="200" id="amount" class="slider">
    <p id="amountVal">$200</p>

    <label>Duration (14 - 120 days)</label>
    <input type="range" min="14" max="120" value="30" id="duration" class="slider">
    <p id="durationVal">30 days</p>
    
    <!-- 🧮 LIVE LOAN CALCULATOR -->
    <div class="calculator-box">
        <div class="calc-row">
            <span>Principal Amount:</span>
            <span id="calcPrincipal" class="calc-val">$200.00</span>
        </div>
        <div class="calc-row">
            <span>Interest Charged:</span>
            <span id="calcInterest" class="calc-val">$0.00</span>
        </div>
        <div class="calc-row">
            <span>Total Repayable:</span>
            <span id="calcTotal" class="total-val">$200.00</span>
        </div>
    </div>

    <p id="repayment"></p>

    <textarea id="reason" placeholder="Enter reason for loan (e.g. business, school fees)"></textarea>

    <button onclick="nextStep1()">Next</button>

</div>

<!-- 🔵 BOTTOM -->
<div class="footer"></div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("loaded");
    
    const amountSlider = document.getElementById("amount");
    const durationSlider = document.getElementById("duration");
    const amountVal = document.getElementById("amountVal");
    const durationVal = document.getElementById("durationVal");
    
    const calcPrincipal = document.getElementById("calcPrincipal");
    const calcInterest = document.getElementById("calcInterest");
    const calcTotal = document.getElementById("calcTotal");
    
    // Set your interest profile here.
    // Example: 0.5% interest per day (which translates to roughly 15% per month)
    const DAILY_INTEREST_RATE = 0.005; 

    function updateCalculator() {
        const principal = parseFloat(amountSlider.value);
        const days = parseInt(durationSlider.value);
        
        // Update basic text labels below sliders
        amountVal.innerText = `$${principal}`;
        durationVal.innerText = `${days} days`;
        
        // Dynamic Math: Interest now scales directly with the time duration
        const interestCost = principal * DAILY_INTEREST_RATE * days;
        const totalPayable = principal + interestCost;
        
        // Render out results cleanly formatted to 2 decimal places
        calcPrincipal.innerText = `$${principal.toFixed(2)}`;
        calcInterest.innerText = `$${interestCost.toFixed(2)}`;
        calcTotal.innerText = `$${totalPayable.toFixed(2)}`;
    }

    // Event listeners to force updates instantly when sliders move
    amountSlider.addEventListener("input", updateCalculator);
    durationSlider.addEventListener("input", updateCalculator);
    
    // Initial display run to sync on page load
    updateCalculator();
});
</script>

<script>
function showLoaderAndGo(url) {
    document.getElementById("pageLoader").style.display = "block";
    setTimeout(() => {
        window.location.href = url;
    }, 800);
}
</script>
<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
