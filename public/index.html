<!DOCTYPE html>
<html>
<head>
    <title>EcoCash Loan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Loan Application</h2>

    <!-- Amount -->
    <label>Loan Amount ($100 - $1000)</label>
    <input type="range" min="100" max="1000" class="slider">

    <!-- Duration -->
    <label>Duration (14 - 120 days)</label>
    <input type="range" min="14" max="120" class="slider">

    <!-- Reason -->
    <textarea placeholder="Enter reason for loan"></textarea>

    <button>Next</button>

</div>

<div class="footer"></div>

</body>
</html>
