<!DOCTYPE html>
<html>

<head>
    <title>EcoCash Loan</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header"></div>

<div class="container">

    <h2 class="title">Loan Details</h2>

    <label>Amount ($100 - $1000)</label>
    <input type="range" min="100" max="1000" id="amount" class="slider">
    <p id="amountVal"></p>

    <label>Duration (14 - 120 days)</label>
    <input type="range" min="14" max="120" id="duration" class="slider">
    <p id="durationVal"></p>
    <p id="repayment"></p>

    <textarea id="reason" placeholder="Enter reason for loan"></textarea>

    <button onclick="nextStep1()">Next</button>

</div>

<div class="footer"></div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("loaded");
});
</script>

<div id="pageLoader" class="loader" style="display:none;"></div>

</body>
</html>
