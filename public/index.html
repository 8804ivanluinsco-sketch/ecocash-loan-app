<!DOCTYPE html>
<html>

<head>
    <title>Step 1</title>
    
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- ✅ MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="style.css">    
</head>

<body>

<!-- 🔵 TOP -->
<div class="header">
    <div class="header-left">
        <img src="logo.jpeg" class="logo">
        <span class="brand">Telecel</span>
    </div>
    <div class="menu">☰</div>
</div>

<!-- ⚪ CENTER CARD -->
<div class="container">

    <h2 class="title">Get Your Loan Approved Fast</h2>
    <p style="text-align:center; color:#777;">
        Quick approval • Competitive rates • Flexible terms
    </p>

    <div class="calculator">

        <h3 style="text-align:center;">Loan Calculator</h3>

        <label>Loan Amount</label>
        <input type="range" min="1500" max="50000" id="amount">
        <p id="amountVal"></p>

        <label>Loan Term</label>
        <input type="range" min="14" max="120" id="duration">
        <p id="durationVal"></p>

        <div class="payment-box">
            <h3>Monthly Payment</h3>
            <p id="repayment"></p>
        </div>

    </div>

    <button onclick="nextStep1()">APPLY NOW</button>

</div>

<!-- 🔵 BOTTOM -->
<div class="footer"></div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("loaded");
});
</script>

<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
