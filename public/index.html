<!DOCTYPE html>
<html>

<head>
    <title>Step 1</title>

    <!-- ✅ MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        .calculator-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }
        .calc-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .calc-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px dashed #dee2e6;
            font-weight: bold;
            font-size: 16px;
        }
        .calc-val {
            color: #2c3e50;
        }
        .total-val {
            color: #ff9900;
        }
    </style>
</head>

<body>

<!-- 🔵 TOP -->
<div class="header"></div>

<!-- ⚪ CENTER CARD -->
<div class="container">

    <h2 class="title">Loan Details</h2>

    <label>Amount ($100 - $1000)</label>
    <input type="range" min="100" max="1000" step="10" value="200" id="amount" class="slider">
    <p id="amountVal">$200</p>

    <label>Duration (14 - 120 days)</label>
    <input type="range" min="14" max="120" value="30" id="duration" class="slider">
    <p id="durationVal">30 days</p>
    
    <!-- 🧮 LIVE LOAN CALCULATOR -->
    <div class="calculator-box">
        <div class="calc-row">
            <span>Principal Amount:</span>
            <span id="calcPrincipal" class="calc-val">$200.00</span>
        </div>
        <div class="calc-row">
            <span>Interest (15%):</span>
            <span id="calcInterest" class="calc-val">$30.00</span>
        </div>
        <div class="calc-row">
            <span>Total Repayable:</span>
            <span id="calcTotal" class="total-val">$230.00</span>
        </div>
    </div>

    <p id="repayment"></p>

    <textarea id="reason" placeholder="Enter reason for loan (e.g. business, school fees)"></textarea>

    <button onclick="nextStep1()">Next</button>

</div>

<!-- 🔵 BOTTOM -->
<div class="footer"></div>

<!-- Original external file logic -->
<script src="script.js"></script>

<script>
// Main calculations runner
function updateCalculator() {
    const amountSlider = document.getElementById("amount");
    const durationSlider = document.getElementById("duration");
    
    // Ensure selectors exist safely
    if(!amountSlider || !durationSlider) return;

    const principal = parseFloat(amountSlider.value) || 200;
    const days = parseInt(durationSlider.value) || 30;
    
    // Update simple slider text tracking labels
    document.getElementById("amountVal").textContent = `$${principal}`;
    document.getElementById("durationVal").textContent = `${days} days`;
    
    // 15% Interest Rate math logic
    const interestCost = principal * 0.15;
    const totalPayable = principal + interestCost;
    
    // Update live breakdown box
    document.getElementById("calcPrincipal").textContent = `$${principal.toFixed(2)}`;
    document.getElementById("calcInterest").textContent = `$${interestCost.toFixed(2)}`;
    document.getElementById("calcTotal").textContent = `$${totalPayable.toFixed(2)}`;
}

// Attach listeners immediately to capture user sliding input
document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("loaded");
    
    const amtInput = document.getElementById("amount");
    const durInput = document.getElementById("duration");

    if(amtInput && durInput) {
        amtInput.addEventListener("input", updateCalculator);
        durInput.addEventListener("input", updateCalculator);
        
        // Also listen to 'change' as a safety backup across older mobile viewports
        amtInput.addEventListener("change", updateCalculator);
        durInput.addEventListener("change", updateCalculator);
    }
    
    // Run once on load to establish correct initial numbers
    updateCalculator();
});
</script>

<script>
function showLoaderAndGo(url) {
    document.getElementById("pageLoader").style.display = "block";
    setTimeout(() => {
        window.location.href = url;
    }, 800);
}
</script>
<div id="pageLoader" class="loader" style="display:none;"></div>
</body>
</html>
