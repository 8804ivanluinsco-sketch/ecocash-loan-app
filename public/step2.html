<!DOCTYPE html>
<html>
<head>
    <title>Step 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header"></div>

<div class="container">
    <h2 class="title">Confirm Loan</h2>

    <p id="amount"></p>
    <p id="duration"></p>
    <p id="reason"></p>

    <button onclick="goNext()">Continue</button>
</div>

<div class="footer"></div>

<script>
window.onload = () => {
    document.body.classList.add("loaded");

    const amount = localStorage.getItem("amount");
    const duration = localStorage.getItem("duration");
    const reason = localStorage.getItem("reason");

    document.getElementById("amount").innerText = "Amount: $" + amount;
    document.getElementById("duration").innerText = "Duration: " + duration + " days";
    document.getElementById("reason").innerText = "Reason: " + reason;
};

function goNext() {
    window.location.href = "step3.html";
}
</script>

</body>
</html>
